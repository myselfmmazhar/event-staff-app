version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Match the local build environment (Node 24). Amplify's default Node
        # triggers a React 19.2 SSR crash when prerendering the isolated
        # global-error page; Node 24 does not.
        - nvm install 24
        - nvm use 24
        - node -v
        - npm ci
    build:
      commands:
        # Ensure the build runs under Node 24 (in case the nvm selection from
        # preBuild does not persist into this phase).
        - nvm use 24
        # Generate .env from Amplify Console environment variables.
        # The actual values live in App settings > Environment variables
        # (encrypted) — only variable NAMES appear in this file. Never paste
        # a literal secret value here; it would be committed to git history.
        - echo "DATABASE_URL=$DATABASE_URL" >> .env
        - echo "DIRECT_URL=$DIRECT_URL" >> .env
        - echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" >> .env
        - echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
        - echo "BETTER_AUTH_URL=$BETTER_AUTH_URL" >> .env
        - echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
        - echo "CRON_SECRET=$CRON_SECRET" >> .env
        # Non-secret static config can stay inline.
        - echo "SEED_ADMIN_ON_BOOT=true" >> .env
        - echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> .env
        - echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env
        - echo "ADMIN_FIRST_NAME=Admin" >> .env
        - echo "ADMIN_LAST_NAME=User" >> .env
        - echo "NEXT_PUBLIC_TERM_STAFF_SINGULAR=Talent" >> .env
        - echo "NEXT_PUBLIC_TERM_STAFF_PLURAL=Talents" >> .env
        - echo "NEXT_PUBLIC_TERM_EVENT_SINGULAR=Task" >> .env
        - echo "NEXT_PUBLIC_TERM_EVENT_PLURAL=Tasks" >> .env
        - echo "SMTP_HOST=sandbox.smtp.mailtrap.io" >> .env
        - echo "SMTP_PORT=2525" >> .env
        - echo "SMTP_USER=$SMTP_USER" >> .env
        - echo "SMTP_PASS=$SMTP_PASS" >> .env
        - echo "SMTP_SECURE=false" >> .env
        - echo "EMAIL_FROM=$EMAIL_FROM" >> .env
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env
        - echo "NEXT_PUBLIC_MAPBOX_TOKEN=$NEXT_PUBLIC_MAPBOX_TOKEN" >> .env

        # Run database migrations and build
        - npx prisma generate
        - npx prisma migrate resolve --applied 20260317_add_time_entry_revisions || true
        - npx prisma migrate deploy
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
